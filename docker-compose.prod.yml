services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # ADMIN_PASSWORD and ADMIN_SESSION_SECRET come from .env; DATABASE_URL below
    # overrides the local-dev value to point at the compose `db` service.
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://nocturne:nocturne@db:5432/nocturne?schema=public&connection_limit=5
    ports:
      - "3000:3000"

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: nocturne
      POSTGRES_PASSWORD: nocturne
      POSTGRES_DB: nocturne
    volumes:
      - nocturne_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocturne -d nocturne"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nocturne_pgdata:
