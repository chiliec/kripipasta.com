services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: kripipasta
      POSTGRES_PASSWORD: kripipasta
      POSTGRES_DB: kripipasta
    ports:
      - "5432:5432"
    volumes:
      - kripipasta_pgdata:/var/lib/postgresql/data

volumes:
  kripipasta_pgdata:
